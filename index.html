<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026 🏆</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --red: #C8102E;
    --red-dark: #9E0D23;
    --red-light: #f8e8eb;
    --gold: #C9A84C;
    --gold-light: #FFF8E7;
    --bg: #F4F4F6;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-2: #5a5a5a;
    --text-3: #999;
    --border: #E0E0E0;
    --radius: 8px;
    --green: #1A6B3A;
    --green-light: #e6f4ec;
    --amber: #B8860B;
    --amber-light: #FFF3CD;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: #fff;
    border-bottom: 3px solid var(--red);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo .trophy { font-size: 28px; }
  .header-title { font-size: 1.1rem; font-weight: 700; color: var(--red); letter-spacing: 0.04em; text-transform: uppercase; }
  .header-subtitle { font-size: 0.72rem; color: var(--text-2); letter-spacing: 0.06em; text-transform: uppercase; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .sync-badge {
    font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 4px;
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .sync-dot.ok { background: #22c55e; }
  .sync-dot.err { background: var(--red); }

  /* LAYOUT */
  .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media (max-width: 750px) { .grid-2 { grid-template-columns: 1fr; } }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  @media (max-width: 700px) { .grid-3 { grid-template-columns: 1fr; } }

  /* CARDS */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-header {
    background: var(--red);
    color: #fff;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header .badge {
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
  }
  .card-body { padding: 16px; }

  /* PLACAR RANKING */
  .ranking-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .ranking-item:last-child { border-bottom: none; }
  .rank-pos {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }
  .rank-pos.p1 { background: var(--gold); color: #fff; }
  .rank-pos.p2 { background: #C0C0C0; color: #fff; }
  .rank-pos.p3 { background: #CD7F32; color: #fff; }
  .rank-pos.other { background: var(--bg); color: var(--text-2); }
  .rank-name { flex: 1; font-size: 14px; font-weight: 600; }
  .rank-pts {
    font-size: 20px; font-weight: 800; color: var(--red);
    min-width: 40px; text-align: right;
  }
  .rank-pts-label { font-size: 10px; color: var(--text-3); text-align: right; }
  .rank-progress {
    height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px;
  }
  .rank-progress-bar { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.5s; }

  /* JOGOS DO DIA */
  .match-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .match-header {
    background: var(--bg);
    padding: 6px 12px;
    font-size: 11px;
    color: var(--text-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .match-header .status-live {
    background: var(--red); color: #fff;
    padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
    animation: pulse 1.5s infinite;
  }
  .match-header .status-ft { color: var(--text-3); font-size: 10px; }
  .match-header .status-ns { color: var(--amber); font-size: 10px; font-weight: 600; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .match-body {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
  }
  .team-name { font-size: 14px; font-weight: 700; }
  .team-home { text-align: right; }
  .team-away { text-align: left; }
  .team-flag { font-size: 24px; display: block; margin-bottom: 4px; }

  .score-box {
    text-align: center;
    background: var(--bg);
    border-radius: 6px;
    padding: 8px 16px;
    min-width: 80px;
  }
  .score-num { font-size: 26px; font-weight: 800; color: var(--red); letter-spacing: 2px; }
  .score-sep { color: var(--text-3); }
  .score-label { font-size: 10px; color: var(--text-3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* PALPITE FORM */
  .palpite-section { padding: 14px 16px; border-top: 1px solid var(--border); }
  .palpite-section label { font-size: 11px; color: var(--text-2); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 8px; }

  .palpite-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .palpite-score-in {
    width: 100%;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 8px 4px;
    color: var(--red);
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  .palpite-score-in:focus { border-color: var(--red); }
  .palpite-sep { text-align: center; color: var(--text-3); font-size: 18px; font-weight: 700; }

  .btn-submit {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .btn-submit:hover { background: var(--red-dark); }
  .btn-submit:disabled { background: #ccc; cursor: default; }

  .palpite-existing {
    font-size: 12px;
    color: var(--green);
    background: var(--green-light);
    border-radius: 4px;
    padding: 6px 10px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* PLAYER SELECT */
  .player-bar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 10px 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .player-bar label { font-size: 12px; color: var(--text-2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .player-select {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: #fff;
    cursor: pointer;
    min-width: 180px;
    outline: none;
    transition: border-color 0.2s;
  }
  .player-select:focus { border-color: var(--red); }

  .player-pts-badge {
    background: var(--red-light);
    color: var(--red);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 14px;
    font-weight: 800;
    margin-left: auto;
  }

  /* TABS */
  .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1.2rem; }
  .tab-btn {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-2);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    max-width: 320px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  /* LEGENDA DE PONTOS */
  .scoring-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .scoring-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-2);
  }
  .scoring-chip .pts {
    font-weight: 800;
    color: var(--red);
    font-size: 13px;
  }

  /* HISTÓRICO TABLE */
  .hist-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .hist-table th {
    padding: 8px 10px;
    background: var(--bg);
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
  }
  .hist-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .hist-table tr:last-child td { border-bottom: none; }
  .pts-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
  }
  .pts-3 { background: #E8F5E9; color: #1B5E20; }
  .pts-2 { background: var(--amber-light); color: #7a5c00; }
  .pts-1 { background: #E3F2FD; color: #0D47A1; }
  .pts-0 { background: var(--bg); color: var(--text-3); }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 2rem;
    color: var(--text-3);
    font-size: 13px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 2rem; color: var(--text-3); font-size: 13px; }
  .empty .emoji { font-size: 32px; margin-bottom: 8px; }

  

  /* HERO STATS */
  .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .hero-stat { background: #fff; border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); text-align: center; }
  .hero-stat .val { font-size: 24px; font-weight: 800; color: var(--red); }
  .hero-stat .lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-2); margin-bottom: 12px;
  }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <span class="trophy">🏆</span>
    <div>
      <div class="header-title">Bolão Copa 2026</div>
      <div class="header-subtitle">FIFA World Cup · USA·CAN·MEX</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-badge">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Conectando...</span>
    </div>
  </div>
</div>

<!-- PLAYER BAR -->
<div class="player-bar">
  <label>Participante:</label>
  <select class="player-select" id="playerSelect" onchange="onPlayerChange()">
    <option value="">— Selecione —</option>
    <option value="Leo">Léo</option>
    <option value="Mayra">Mayra</option>
    <option value="Caio">Caio</option>
    <option value="Joca">Joca</option>
    <option value="Ronaldo">Ronaldo</option>
    <option value="Maia">Maia</option>
    <option value="Ana">Ana</option>
    <option value="Abel">Abel (Goleiro 🐱)</option>
  </select>
  <div class="player-pts-badge" id="playerPtsBadge" style="display:none">
    <span id="playerPtsVal">0</span> pts
  </div>
</div>

<!-- APP BODY -->
<div class="app">

  <!-- HERO STATS -->
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="val" id="statJogos">—</div>
      <div class="lbl">Jogos na Copa</div>
    </div>
    <div class="hero-stat">
      <div class="val" id="statHoje">—</div>
      <div class="lbl">Jogos Hoje</div>
    </div>
    <div class="hero-stat">
      <div class="val" id="statPalpites">—</div>
      <div class="lbl">Palpites Registrados</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('jogos')">📅 Jogos</button>
    <button class="tab-btn" onclick="switchTab('ranking')">🏆 Ranking</button>
    <button class="tab-btn" onclick="switchTab('historico')">📋 Histórico</button>
  </div>

  <!-- TAB: JOGOS -->
  <div class="tab-content active" id="tab-jogos">
    <div class="scoring-legend">
      <div class="scoring-chip"><span class="pts">3 pts</span> Placar exato</div>
      <div class="scoring-chip"><span class="pts">2 pts</span> Vencedor correto</div>
      <div class="scoring-chip"><span class="pts">1 pt</span> Empate correto</div>
    </div>
    <div id="matchesContainer">
      <div class="loading"><div class="spinner"></div><br>Carregando jogos...</div>
    </div>
  </div>

  <!-- TAB: RANKING -->
  <div class="tab-content" id="tab-ranking">
    <div id="rankingContainer">
      <div class="loading"><div class="spinner"></div><br>Carregando ranking...</div>
    </div>
  </div>

  <!-- TAB: HISTÓRICO -->
  <div class="tab-content" id="tab-historico">
    <div id="historicoContainer">
      <div class="empty"><div class="emoji">🗂️</div>Selecione um participante para ver o histórico.</div>
    </div>
  </div>

</div>

<script>
// ============================================================
// CONFIGURAÇÃO — HARDCODED
// ============================================================
const PLAYERS = ['Leo','Mayra','Caio','Joca','Ronaldo','Maia','Ana','Abel'];
const PLAYER_LABELS = {'Abel':'Abel (Goleiro 🐱)'};
const COMPETITION_ID = 2000;

const SB_URL = 'https://hljvcyxckzgsrzdafpcq.supabase.co';
const SB_KEY = 'sb_publishable_PQ6dP6z_lsr92QRr9YQo_g_5-e_7j4J';
const FD_KEY = '021f60308fe04a6fac809b8088397666';

let supabase = null;
let fdApiKey = FD_KEY;
let currentPlayer = '';
let allMatches = [];
let allPalpites = [];

// ============================================================
// ============================================================
// INICIALIZAÇÃO
// ============================================================
function initSupabase(url, key) {
  try {
    const { createClient } = window.supabase;
    return createClient(url, key);
  } catch(e) { return null; }
}

async function init() {
  supabase = initSupabase(SB_URL, SB_KEY);
  if (!supabase) { setSyncStatus(false, 'Erro Supabase'); return; }

  await Promise.all([loadMatches(), loadAllPalpites()]);
  renderAll();
  setSyncStatus(true, 'Atualizado ' + fmtHora(new Date()));

  setInterval(async () => {
    await Promise.all([loadMatches(), loadAllPalpites()]);
    renderAll();
    setSyncStatus(true, 'Atualizado ' + fmtHora(new Date()));
  }, 15 * 60 * 1000);
}

// ============================================================
// FOOTBALL DATA API
// ============================================================
async function loadMatches() {
  try {
    // Busca jogos dos últimos 2 dias + próximos 3
    const today = new Date();
    const from = new Date(today); from.setDate(from.getDate() - 2);
    const to = new Date(today); to.setDate(to.getDate() + 3);

    const fmt = d => d.toISOString().split('T')[0];
    const url = `https://api.football-data.org/v4/competitions/${COMPETITION_ID}/matches?dateFrom=${fmt(from)}&dateTo=${fmt(to)}`;

    const res = await fetch(url, {
      headers: { 'X-Auth-Token': fdApiKey }
    });
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    allMatches = data.matches || [];
    document.getElementById('statJogos').textContent = data.resultSet?.count || '64';
    document.getElementById('statHoje').textContent = allMatches.filter(m => {
      const md = new Date(m.utcDate).toDateString();
      return md === new Date().toDateString();
    }).length;
  } catch(e) {
    console.error('Matches error:', e);
    allMatches = getMockMatches();
    setSyncStatus(false, 'API indisponível (demo)');
  }
}

// ============================================================
// SUPABASE: PALPITES
// ============================================================
async function loadAllPalpites() {
  if (!supabase) return;
  try {
    const { data, error } = await supabase
      .from('palpites')
      .select('*');
    if (error) throw error;
    allPalpites = data || [];
    document.getElementById('statPalpites').textContent = allPalpites.length;
  } catch(e) {
    console.error('Palpites error:', e);
  }
}

async function savePalpite(matchId, matchLabel, homeGoals, awayGoals, homeTeam, awayTeam, matchDate) {
  if (!supabase) { showToast('Supabase não configurado.', 'error'); return; }
  if (!currentPlayer) { showToast('Selecione seu nome primeiro!', 'error'); return; }
  if (homeGoals === '' || awayGoals === '') { showToast('Preencha o placar do palpite.', 'error'); return; }

  const record = {
    player: currentPlayer,
    match_id: String(matchId),
    match_label: matchLabel,
    home_team: homeTeam,
    away_team: awayTeam,
    match_date: matchDate,
    home_goals: parseInt(homeGoals),
    away_goals: parseInt(awayGoals),
    created_at: new Date().toISOString(),
  };

  try {
    // Upsert: um palpite por participante por jogo
    const { error } = await supabase
      .from('palpites')
      .upsert(record, { onConflict: 'player,match_id' });
    if (error) throw error;
    showToast(`Palpite ${homeGoals}x${awayGoals} salvo!`, 'success');
    await loadAllPalpites();
    renderAll();
  } catch(e) {
    console.error(e);
    showToast('Erro ao salvar: ' + e.message, 'error');
  }
}

// ============================================================
// PONTUAÇÃO
// ============================================================
function calcPoints(palp, match) {
  const s = match.score && match.score.fullTime;
  if (!s || s.home === null || s.away === null) return null; // jogo não encerrado
  const resReal = Math.sign(s.home - s.away);
  const resPalp = Math.sign(palp.home_goals - palp.away_goals);
  if (palp.home_goals === s.home && palp.away_goals === s.away) return 3;
  if (resReal === resPalp) return (resReal === 0) ? 1 : 2;
  return 0;
}

function calcRanking() {
  const pts = {};
  PLAYERS.forEach(p => pts[p] = { player: p, total: 0, acertos: 0, jogos: 0 });

  allPalpites.forEach(palp => {
    const match = allMatches.find(m => String(m.id) === String(palp.match_id));
    if (!match) return;
    const p = calcPoints(palp, match);
    if (p === null) return;
    if (!pts[palp.player]) pts[palp.player] = { player: palp.player, total: 0, acertos: 0, jogos: 0 };
    pts[palp.player].total += p;
    pts[palp.player].jogos += 1;
    if (p > 0) pts[palp.player].acertos += 1;
  });

  return Object.values(pts).sort((a, b) => b.total - a.total || b.acertos - a.acertos);
}

// ============================================================
// RENDER: MATCHES
// ============================================================
function renderAll() {
  renderMatches();
  renderRanking();
  if (currentPlayer) renderHistorico();
}

function renderMatches() {
  const container = document.getElementById('matchesContainer');
  if (!allMatches.length) {
    container.innerHTML = `<div class="empty"><div class="emoji">⚽</div>Nenhum jogo encontrado no período.</div>`;
    return;
  }

  // Agrupar por data
  const grouped = {};
  allMatches.forEach(m => {
    const d = new Date(m.utcDate);
    const key = d.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(m);
  });

  let html = '';
  Object.entries(grouped).forEach(([dateLabel, matches]) => {
    html += `<div class="section-title">${dateLabel.toUpperCase()}</div>`;
    matches.forEach(m => {
      html += renderMatchCard(m);
    });
  });

  container.innerHTML = html;

  // Bind submit buttons
  document.querySelectorAll('.btn-palpite').forEach(btn => {
    var mid = btn.getAttribute('data-mid');
    btn.onclick = (function(id){
      return function() { submitPalpite(id); };
    })(mid);
  });
}

function renderMatchCard(m) {
  const homeFlag = flagEmoji(m.homeTeam?.tla || '');
  const awayFlag = flagEmoji(m.awayTeam?.tla || '');
  const homeName = m.homeTeam?.shortName || m.homeTeam?.name || 'Casa';
  const awayName = m.awayTeam?.shortName || m.awayTeam?.name || 'Fora';
  const d = new Date(m.utcDate);
  const hora = d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  const s = m.score && m.score.fullTime;

  let status = '';
  let scoreHtml = '';
  const st = m.status;

  if (st === 'IN_PLAY' || st === 'PAUSED') {
    status = `<span class="status-live">AO VIVO</span>`;
    scoreHtml = `<div class="score-box"><div class="score-num">${s?.home ?? 0} <span class="score-sep">×</span> ${s?.away ?? 0}</div><div class="score-label">Em andamento</div></div>`;
  } else if (st === 'FINISHED') {
    status = `<span class="status-ft">ENCERRADO</span>`;
    scoreHtml = `<div class="score-box"><div class="score-num">${s.home} <span class="score-sep">×</span> ${s.away}</div><div class="score-label">Resultado Final</div></div>`;
  } else {
    status = `<span class="status-ns">${hora}</span>`;
    scoreHtml = `<div class="score-box"><div class="score-num" style="font-size:18px;color:var(--text-3);">vs</div><div class="score-label">${hora} (horário de Brasília)</div></div>`;
  }

  // Palpite existente deste player para este jogo
  const existingPalp = currentPlayer ? allPalpites.find(p => p.player === currentPlayer && String(p.match_id) === String(m.id)) : null;
  let palpiteHtml = '';
  let palpPtsHtml = '';

  if (st === 'FINISHED' && existingPalp) {
    const pts = calcPoints(existingPalp, m);
    const ptsClass = pts === 3 ? 'pts-3' : pts === 2 ? 'pts-2' : pts === 1 ? 'pts-1' : 'pts-0';
    const ptsLabel = pts === 3 ? '🎯 Placar exato!' : pts === 2 ? '✅ Vencedor correto' : pts === 1 ? '🤝 Empate correto' : '❌ Errou';
    palpPtsHtml = `<div class="pts-chip ${ptsClass}" style="font-size:13px;padding:4px 12px;">${ptsLabel} · <strong>+${pts} pts</strong></div>`;
  }

  if (currentPlayer && st !== 'FINISHED') {
    const existVal = existingPalp ? `value="${existingPalp.home_goals}"` : '';
    const existValA = existingPalp ? `value="${existingPalp.away_goals}"` : '';
    if (existingPalp) {
      palpiteHtml = `
        <div class="palpite-section">
          <div class="palpite-existing">✅ Seu palpite: ${existingPalp.home_goals}×${existingPalp.away_goals} — você pode alterar até o início do jogo</div>
          <label>Alterar palpite</label>
          <div class="palpite-grid">
            <input class="palpite-score-in" type="number" min="0" max="20" id="h-${m.id}" ${existVal} placeholder="0">
            <div class="palpite-sep">×</div>
            <input class="palpite-score-in" type="number" min="0" max="20" id="a-${m.id}" ${existValA} placeholder="0">
          </div>
          <button class="btn-submit btn-palpite" data-mid="${m.id}">Atualizar Palpite</button>
        </div>`;
    } else {
      palpiteHtml = `
        <div class="palpite-section">
          <label>Seu palpite</label>
          <div class="palpite-grid">
            <input class="palpite-score-in" type="number" min="0" max="20" id="h-${m.id}" placeholder="0">
            <div class="palpite-sep">×</div>
            <input class="palpite-score-in" type="number" min="0" max="20" id="a-${m.id}" placeholder="0">
          </div>
          <button class="btn-submit btn-palpite" data-mid="${m.id}">Enviar Palpite</button>
        </div>`;
    }
  } else if (!currentPlayer && st !== 'FINISHED') {
    palpiteHtml = `<div class="palpite-section" style="color:var(--text-3);font-size:12px;">Selecione seu nome para fazer um palpite.</div>`;
  } else if (st === 'FINISHED' && !existingPalp) {
    palpiteHtml = `<div class="palpite-section" style="color:var(--text-3);font-size:12px;">Nenhum palpite registrado para este jogo.</div>`;
  } else if (st === 'FINISHED' && existingPalp) {
    palpiteHtml = `<div class="palpite-section">
      <label>Seu palpite</label>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <span style="font-size:20px;font-weight:800;color:var(--text-2)">${existingPalp.home_goals} × ${existingPalp.away_goals}</span>
        ${palpPtsHtml}
      </div>
    </div>`;
  }

  const round = m.stage ? m.stage.replace(/_/g,' ') : 'Fase de Grupos';
  const group = m.group ? ` · ${m.group}` : '';

  return `
    <div class="match-card">
      <div class="match-header">
        <span>${round}${group}</span>
        ${status}
      </div>
      <div class="match-body">
        <div class="team-home">
          <span class="team-flag">${homeFlag}</span>
          <div class="team-name">${homeName}</div>
        </div>
        ${scoreHtml}
        <div class="team-away">
          <span class="team-flag">${awayFlag}</span>
          <div class="team-name">${awayName}</div>
        </div>
      </div>
      ${palpiteHtml}
    </div>`;
}

// ============================================================
// RENDER: RANKING
// ============================================================
function renderRanking() {
  const ranking = calcRanking();
  const maxPts = ranking[0]?.total || 1;

  // Pegar pontos históricos (da imagem) como fallback se não há palpites calculados
  const historico = { Leo: 71, Mayra: 60, Caio: 57, Joca: 54, Ronaldo: 54, Maia: 43, Ana: 41, Abel: 0 };

  let html = '<div class="card"><div class="card-header">Classificação <span class="badge">GERAL</span></div><div class="card-body">';

  ranking.forEach((r, i) => {
    const posClass = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : 'other';
    const pct = maxPts > 0 ? Math.round((r.total / maxPts) * 100) : 0;
    const hist = historico[r.player] || 0;
    const total = r.total + hist;
    const label = PLAYER_LABELS[r.player] || r.player;
    html += `
      <div class="ranking-item">
        <div class="rank-pos ${posClass}">${i+1}</div>
        <div style="flex:1">
          <div class="rank-name">${label}</div>
          <div style="font-size:11px;color:var(--text-3)">${r.jogos} palpite(s) pontuado(s) · ${r.acertos} acerto(s)</div>
          <div class="rank-progress"><div class="rank-progress-bar" style="width:${pct}%"></div></div>
        </div>
        <div>
          <div class="rank-pts">${total}</div>
          <div class="rank-pts-label">PONTOS</div>
        </div>
      </div>`;
  });

  html += '</div></div>';
  document.getElementById('rankingContainer').innerHTML = html;
}

// ============================================================
// RENDER: HISTÓRICO
// ============================================================
function renderHistorico() {
  if (!currentPlayer) return;
  const meusPalpites = allPalpites.filter(p => p.player === currentPlayer);

  if (!meusPalpites.length) {
    document.getElementById('historicoContainer').innerHTML = `<div class="empty"><div class="emoji">📝</div>Nenhum palpite registrado ainda.</div>`;
    return;
  }

  let html = `<table class="hist-table">
    <thead><tr>
      <th>Jogo</th><th>Data</th><th>Seu Palpite</th><th>Resultado</th><th>Pontos</th>
    </tr></thead><tbody>`;

  meusPalpites.forEach(p => {
    const match = allMatches.find(m => String(m.id) === String(p.match_id));
    const s = match && match.score && match.score.fullTime;
    const finished = match && match.status === 'FINISHED';
    const pts = finished ? calcPoints(p, match) : null;
    const ptsClass = pts === 3 ? 'pts-3' : pts === 2 ? 'pts-2' : pts === 1 ? 'pts-1' : pts === 0 ? 'pts-0' : '';
    const ptsLabel = pts === null ? '—' : `+${pts}`;
    const resultado = finished && s ? `${s.home}×${s.away}` : '—';
    const d = new Date(p.match_date || (match && match.utcDate) || '');
    const dateStr = isNaN(d) ? '—' : d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});

    html += `<tr>
      <td style="font-weight:600">${p.home_team || '?'} × ${p.away_team || '?'}</td>
      <td style="color:var(--text-3)">${dateStr}</td>
      <td><strong>${p.home_goals}×${p.away_goals}</strong></td>
      <td style="color:var(--text-3)">${resultado}</td>
      <td>${pts !== null ? `<span class="pts-chip ${ptsClass}">${ptsLabel}</span>` : '<span style="color:var(--text-3);font-size:12px">pendente</span>'}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('historicoContainer').innerHTML = html;
}

// ============================================================
// SUBMIT PALPITE
// ============================================================
function submitPalpite(matchId) {
  const hEl = document.getElementById('h-' + matchId);
  const aEl = document.getElementById('a-' + matchId);
  if (!hEl || !aEl) return;
  const h = hEl.value;
  const a = aEl.value;
  if (h === '' || a === '') { showToast('Preencha o placar completo.', 'error'); return; }
  const match = allMatches.find(m => String(m.id) === String(matchId));
  if (!match) return;
  const home = match.homeTeam?.shortName || 'Casa';
  const away = match.awayTeam?.shortName || 'Fora';
  const lbl = `${home} × ${away}`;
  savePalpite(matchId, lbl, h, a, home, away, match.utcDate);
}

// ============================================================
// PLAYER CHANGE
// ============================================================
function onPlayerChange() {
  currentPlayer = document.getElementById('playerSelect').value;
  const badge = document.getElementById('playerPtsBadge');
  if (currentPlayer) {
    badge.style.display = 'block';
    const ranking = calcRanking();
    const r = ranking.find(x => x.player === currentPlayer);
    const hist = { Leo: 71, Mayra: 60, Caio: 57, Joca: 54, Ronaldo: 54, Maia: 43, Ana: 41, Abel: 0 };
    document.getElementById('playerPtsVal').textContent = (r?.total || 0) + (hist[currentPlayer] || 0);
  } else {
    badge.style.display = 'none';
  }
  renderAll();
  if (currentPlayer) renderHistorico();
}

// ============================================================
// TABS
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const tabs = { jogos: 0, ranking: 1, historico: 2 };
  document.querySelectorAll('.tab-btn')[tabs[name]].classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'ranking') renderRanking();
  if (name === 'historico') renderHistorico();
}

function setSyncStatus(ok, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');

  lbl.textContent = label;
}

function fmtHora(d) {
  return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');

  t.className = 'toast show ' + (type || '');

}
